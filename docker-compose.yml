name: anime_manager

services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: ./.env
        required: false
    ports:
      - "8031:8031"
    volumes:
      - ./data:/app/data
      - ${HOST_DOWNLOAD_DIR:-./downloads}:/downloads
      - ${HOST_MEDIA_LIBRARY_DIR:-./media}:/media
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8031

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  frontend_node_modules:
