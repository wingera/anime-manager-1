name: anime_manager

services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${BACKEND_PORT:-8031}:8031"
    volumes:
      - ./data:/app/data
      - ${HOST_DOWNLOAD_DIR:-./downloads}:/downloads
      - ${HOST_MEDIA_LIBRARY_DIR:-./media}:/media
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8031/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
