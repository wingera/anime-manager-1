name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: 后端检查
        run: |
          cd backend
          python -m pip install -e ".[dev]"
          python -m ruff check app tests
          python -m mypy app
          python -m pytest
      - name: 前端检查
        run: |
          cd frontend
          npm install
          npm run typecheck
          npm run build
